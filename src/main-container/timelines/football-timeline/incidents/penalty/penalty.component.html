<div class="event penalty penalty-{{data()?.direction}}">
  <div class="event-icon penalty-icon">🅿️</div>
  <div class="event-details">
    <div class="event-time">{{ data()?.time }}</div>
    <div class="event-description">
      <span class="team-badge penalty-badge" [class.team-left]="data()?.direction === 'left'">
        {{ data()?.teamName }}
      </span>
      <span class="penalty-player">{{ data()?.player }} - PENALTY</span>
    </div>
  </div>
</div>
