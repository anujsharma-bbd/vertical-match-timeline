<div class="event penalty" [class.penalty-right]="direction() === 'right'">
  <div class="event-icon penalty-icon">🅿️</div>
  <div class="event-details">
    <div class="event-time">{{ time() }}</div>
    <div class="event-description">
      <span class="team-badge penalty-badge" [class.team-right]="direction() === 'right'">
        {{ teamName() }}
      </span>
      <span class="penalty-player">{{ player() }} - PENALTY</span>
    </div>
  </div>
</div>
