<div class="event toss toss-{{data()?.direction}}">
  <div class="event-icon toss-icon">🪙</div>
  <div class="event-details">
    <div class="event-description">
      <span class="team-badge" [class.team-left]="data()?.direction === 'left'">{{ data()?.team }}</span>
      <span class="toss-info">WON TOSS</span>
    </div>
    <div class="toss-decision">{{ data()?.decision }}</div>
  </div>
</div>
