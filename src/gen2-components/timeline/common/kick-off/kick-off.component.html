<div class="event kick-off kick-off-{{data()?.direction}}">
  <div class="event-icon">⚽</div>
  <div class="event-details">
    <div class="event-time">{{ data()?.time }}</div>
    <div class="event-description">
      <span class="team-badge" [class.team-left]="data()?.direction === 'left'">
        {{ data()?.teamName }}
      </span>
      <span class="event-text">Kick Off</span>
    </div>
  </div>
</div>
