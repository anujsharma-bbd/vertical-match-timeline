<div class="event game-end">
  <div class="event-icon game-icon">🏁</div>
  <div class="event-details">
    <div class="event-time">{{ duration() }}</div>
    <div class="event-description">
      <span class="team-badge team-a">{{ teamName() }}</span>
      <span class="final-score">Final Score: {{ score() }}</span>
    </div>
    <div class="match-status">MATCH ENDED</div>
  </div>
</div>
