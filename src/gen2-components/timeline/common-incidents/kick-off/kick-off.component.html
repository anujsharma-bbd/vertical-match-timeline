<div class="event kick-off">
  <div class="event-icon">⚽</div>
  <div class="event-details">
    <div class="event-time">{{ time() }}</div>
    <div class="event-description">
      <span class="team-badge" [class.team-left]="direction() === 'left'">
        {{ teamName() }}
      </span>
      <span class="event-text">Kick Off</span>
    </div>
  </div>
</div>
